<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaAgent Ghost</title>
    <link rel="stylesheet" href="./ghost.css" />
  </head>
  <body>
    <div class="ghost-shell">
      <div class="ghost-drag"></div>
      <div class="ghost-dot"></div>
      <div class="ghost-content">
        <div class="ghost-title-row">
          <span class="ghost-eyebrow">MetaAgent</span>
          <span id="ghostProvider" class="ghost-provider">CODEX</span>
          <button id="ghostClose" class="ghost-close" type="button" aria-label="关闭">×</button>
        </div>
        <strong id="ghostTitle">AI 正在工作</strong>
        <p id="ghostPrompt">等待任务…</p>
        <small id="ghostMeta">准备中</small>
      </div>
    </div>
    <script type="module" src="./ghost.js"></script>
  </body>
</html>
